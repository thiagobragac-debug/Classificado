<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tauze Class — Listagem de anúncios do agronegócio. Filtre por categoria, localização, preço e muito mais.">
  <title>Anúncios — Tauze Class</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/listagem.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231B4332'/><text y='24' x='6' font-size='20' font-weight='800' fill='white' font-family='sans-serif'>T</text></svg>">
</head>
<body>

<!-- ═══ HEADER (mesmo da home) ═══════════════ -->
<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <div class="logo-mark">TC</div>
      <div class="logo-text">
        <span class="logo-name">Tauze Class</span>
        <span class="logo-tagline">Classificados Agro</span>
      </div>
    </a>
    <div class="header-search">
      <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
      <input type="search" id="header-search-input" placeholder="Buscar anúncios..." data-i18n-placeholder="search_placeholder">
    </div>
    <nav class="header-nav">
      <a href="index.html" data-i18n="nav_home">Início</a>
      <a href="listagem.html" class="active" data-i18n="nav_ads">Anúncios</a>
      <a href="login.html" data-i18n="nav_login">Entrar</a>
    </nav>
    <div class="lang-toggle">
      <button data-lang="pt" class="active">PT</button>
      <button data-lang="es">ES</button>
    </div>
    <a href="anunciar.html" class="btn-anunciar-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span data-i18n="btn_post">Anunciar Grátis</span>
    </a>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>
<nav class="mobile-menu" id="mobile-menu">
  <a href="index.html" data-i18n="nav_home">Início</a>
  <a href="listagem.html" data-i18n="nav_ads">Anúncios</a>
  <a href="login.html" data-i18n="nav_login">Entrar</a>
  <a href="anunciar.html" style="color:var(--clr-accent);font-weight:700" data-i18n="btn_post">Anunciar Grátis</a>
</nav>

<main style="margin-top:var(--header-h);min-height:80vh">

  <!-- Page Hero Strip -->
  <div class="list-hero">
    <div class="container">
      <div class="list-hero-inner">
        <div>
          <nav aria-label="Breadcrumb" class="breadcrumb">
            <a href="index.html" data-i18n="nav_home">Início</a>
            <span aria-hidden="true">›</span>
            <span id="bc-category" data-i18n="nav_ads">Todos os Anúncios</span>
          </nav>
          <h1 class="list-hero-title" id="list-page-title">Todos os Anúncios</h1>
          <p class="list-hero-count" id="results-count"></p>
        </div>
        <div class="list-sort-row" role="group" aria-label="Ordenação">
          <label for="sort-select" class="sort-label">Ordenar:</label>
          <select id="sort-select" class="sort-select" aria-label="Ordenar por">
            <option value="recent">Mais Recentes</option>
            <option value="price_asc">Menor Preço</option>
            <option value="price_desc">Maior Preço</option>
            <option value="featured">Destaques Primeiro</option>
          </select>
          <div class="view-toggle" role="group" aria-label="Modo de visualização">
            <button id="view-grid" class="view-btn active" onclick="setView('grid')" aria-label="Visualização em grade" aria-pressed="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
            <button id="view-list" class="view-btn" onclick="setView('list')" aria-label="Visualização em lista" aria-pressed="false">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container list-layout">

    <!-- ─── SIDEBAR FILTERS ─── -->
    <aside class="filter-sidebar" aria-label="Filtros">

      <div class="filter-header">
        <h2 class="filter-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filtros
        </h2>
        <button class="filter-clear" onclick="clearFilters()" id="clear-filters-btn" style="display:none">Limpar</button>
      </div>

      <!-- Category Filter -->
      <div class="filter-group" id="fg-category">
        <button class="filter-group-title" onclick="toggleFilterGroup(this)" aria-expanded="true">
          Categoria
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="filter-options" id="filter-category">
          <label class="filter-option">
            <input type="radio" name="category" value="" checked> Todas as Categorias
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="bovinos"> 🐄 Bovinos <span class="filter-count">12.847</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="equinos"> 🐎 Equinos <span class="filter-count">4.320</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="suinos"> 🐷 Suínos <span class="filter-count">2.104</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="ovinos"> 🐑 Ovinos <span class="filter-count">1.876</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="aves"> 🐦 Aves <span class="filter-count">3.210</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="insumos"> 🌱 Insumos <span class="filter-count">6.543</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="maquinas"> 🚜 Máquinas <span class="filter-count">5.891</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="imoveis"> 🏡 Imóveis <span class="filter-count">2.234</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="genetica"> 🧬 Genética <span class="filter-count">987</span>
          </label>
        </div>
      </div>

      <!-- Location Filter -->
      <div class="filter-group">
        <button class="filter-group-title" onclick="toggleFilterGroup(this)" aria-expanded="true">
          Localização
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="filter-options">
          <select class="filter-select" id="filter-country" aria-label="País" onchange="updateLocationOptions('country')">
            <option value="">Todos os Países</option>
          </select>
          <select class="filter-select" id="filter-state" aria-label="Estado" style="margin-top:8px" onchange="updateLocationOptions('state')" disabled>
            <option value="">Todos os Estados</option>
          </select>
          <select class="filter-select" id="filter-city" aria-label="Cidade" style="margin-top:8px" onchange="applyFilters()" disabled>
            <option value="">Todas as Cidades</option>
          </select>
        </div>
      </div>

      <!-- Price Range -->
      <div class="filter-group">
        <button class="filter-group-title" onclick="toggleFilterGroup(this)" aria-expanded="true">
          Faixa de Preço
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="filter-options">
          <div class="price-range-inputs">
            <input type="number" class="price-input" id="price-min" placeholder="Mín (R$)" aria-label="Preço mínimo">
            <span aria-hidden="true">—</span>
            <input type="number" class="price-input" id="price-max" placeholder="Máx (R$)" aria-label="Preço máximo">
          </div>
          <div class="price-shortcuts" role="group" aria-label="Atalhos de preço">
            <button class="price-shortcut" onclick="setPrice(0,5000)">Até R$5k</button>
            <button class="price-shortcut" onclick="setPrice(5000,20000)">R$5k–20k</button>
            <button class="price-shortcut" onclick="setPrice(20000,100000)">R$20k–100k</button>
            <button class="price-shortcut" onclick="setPrice(100000,'')">+R$100k</button>
          </div>
        </div>
      </div>

      <!-- Condition -->
      <div class="filter-group">
        <button class="filter-group-title" onclick="toggleFilterGroup(this)" aria-expanded="true">
          Tipo de Oferta
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="filter-options">
          <label class="filter-option">
            <input type="checkbox" value="featured" id="chk-featured"> ★ Apenas Destaques
          </label>
          <label class="filter-option">
            <input type="checkbox" value="negotiable" id="chk-negotiable"> 💬 Negociável
          </label>
          <label class="filter-option">
            <input type="checkbox" value="verified" id="chk-verified"> ✓ Vendedor Verificado
          </label>
        </div>
      </div>

      <button class="btn btn--primary" onclick="applyFilters()" style="width:100%;margin-top:var(--sp-4)" id="apply-filters-btn">
        Aplicar Filtros
      </button>

      <!-- BANNER SIDEBAR -->
      <div id="banner-listagem-sidebar" style="margin-top: 1.5rem;"></div>
    </aside>

    <!-- ─── ADS GRID ─── -->
    <div class="list-main" role="main" aria-label="Lista de anúncios">
      <!-- Active filters -->
      <div class="active-filters" id="active-filters" aria-live="polite"></div>

      <!-- Ads Container -->
      <div id="ads-container" class="ads-grid" role="list" aria-label="Anúncios encontrados"></div>

      <!-- Pagination -->
      <nav class="pagination" aria-label="Navegação de páginas" id="pagination">
        <button class="page-btn" onclick="changePage(-1)" aria-label="Página anterior">&larr;</button>
        <button class="page-btn active" aria-current="page">1</button>
        <button class="page-btn" onclick="goToPage(2)">2</button>
        <button class="page-btn" onclick="goToPage(3)">3</button>
        <span class="page-ellipsis">…</span>
        <button class="page-btn" onclick="goToPage(12)">12</button>
        <button class="page-btn" onclick="changePage(1)" aria-label="Próxima página">&rarr;</button>
      </nav>
    </div>

  </div><!-- /.list-layout -->
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom" style="border-top:none;padding-block:var(--sp-6)">
      <span data-i18n="footer_copy">© 2026 Tauze Class. Todos os direitos reservados.</span>
      <a href="index.html" data-i18n="nav_home">← Voltar ao Início</a>
    </div>
  </div>
</footer>

<!-- Mobile Filter Sheet -->
<div class="filter-sheet-overlay" id="filter-overlay" onclick="closeFilterSheet()" aria-hidden="true"></div>
<div class="filter-sheet" id="filter-sheet" aria-label="Filtros móbile" role="dialog" aria-modal="true">
  <div class="filter-sheet-header">
    <h3>Filtros</h3>
    <button onclick="closeFilterSheet()" aria-label="Fechar filtros">✕</button>
  </div>
  <div class="filter-sheet-body">
    <p style="color:var(--clr-text-muted);text-align:center;padding:var(--sp-8)">Use os filtros na barra lateral ao lado →</p>
  </div>
</div>

<button class="mobile-filter-btn" onclick="openFilterSheet()" aria-label="Abrir filtros" id="mobile-filter-btn">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
  Filtros
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/filters.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (typeof renderAdBanner === 'function') {
      renderAdBanner('listagem_sidebar', 'banner-listagem-sidebar');
    }

    // Try to load real ads from Supabase
    const grid = document.getElementById('ads-grid');
    if (!grid) return;

    try {
      const params = new URLSearchParams(window.location.search);
      const category = params.get('cat') || undefined;
      const country  = params.get('pais') || undefined;
      const search   = params.get('q') || undefined;

      const { ads } = await getAds({ category, country, search, limit: 24 });

      if (ads && ads.length > 0) {
        grid.innerHTML = ads.map(ad => {
          const img   = ad.images && ad.images[0] ? ad.images[0] : 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&q=70';
          const price = ad.negotiable ? 'A negociar' :
            new Intl.NumberFormat('pt-BR', { style: 'currency', currency: ad.currency || 'BRL' }).format(ad.price || 0);
          const loc   = [ad.city, ad.state].filter(Boolean).join(', ') || ad.country || '';
          return `
            <a href="/anuncio.html?id=${ad.id}" class="ad-card">
              <div class="ad-card-img-wrap">
                <img src="${img}" alt="${ad.title_pt}" loading="lazy" class="ad-card-img" onerror="this.src='https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&q=70'">
                ${ad.featured ? '<span class="badge-featured">★ Destaque</span>' : ''}
              </div>
              <div class="ad-card-body">
                <p class="ad-card-cat">${ad.category_id || ''}</p>
                <h3 class="ad-card-title">${ad.title_pt}</h3>
                <p class="ad-card-price">${price}</p>
                <div class="ad-card-meta">
                  <span>${loc}</span>
                  <span>${ad.views_count || 0} views</span>
                </div>
              </div>
            </a>
          `;
        }).join('');
      }
    } catch(e) {
      console.warn('Usando dados mock (Supabase indisponível):', e.message);
      // Falls back to static mock data rendered by filters.js
    }
  });
</script>
</body>
</html>
