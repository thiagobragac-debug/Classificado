<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denúncias — Admin Tauze Class</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316A34A'/%3E%3Ctext y='24' x='6' font-size='20' font-weight='800' fill='white' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="adm-layout">
  <aside class="adm-sidebar" id="adm-sidebar"></aside>
  <div class="adm-main">
<div id="global-error-banner" style="display:none; background:red; color:white; padding:15px; font-weight:bold; z-index:9999; position:relative;"></div><script>window.addEventListener('error', function(e) { const b = document.getElementById('global-error-banner'); if(b) { b.style.display = 'block'; b.innerHTML += e.message + '<br>'; } }); window.addEventListener('unhandledrejection', function(e) { const b = document.getElementById('global-error-banner'); if(b) { b.style.display = 'block'; b.innerHTML += e.reason + '<br>'; } });</script>

    <header class="adm-topbar">
      <div class="adm-breadcrumb">
        <a href="/admin/index.html">Dashboard</a><span>›</span><strong>Denúncias</strong>
      </div>
      <div class="adm-topbar-right">
        <button class="adm-topbar-btn" title="Notificações" onclick="showToast('Sem novas notificações', 'info')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="adm-notif-dot"></span>
        </button>
      </div>
    </header>

    <main class="adm-content">
      <div class="adm-page-header">
        <h1 class="adm-page-title">Central de Denúncias</h1>
        <p class="adm-page-sub">Gerencie os anúncios denunciados pelos usuários do portal.</p>
      </div>

      <!-- Alert Banner -->
      <div id="denuncia-alert" style="display:none; background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:var(--adm-r-md);padding:12px 16px;align-items:center;gap:10px;margin-bottom:20px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--adm-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="denuncia-alert-msg" style="font-size:.875rem;color:var(--adm-red);font-weight:600"></span>
        <a href="#" onclick="document.querySelectorAll('.adm-badge--high').forEach(e=>e.closest('tr').scrollIntoView({behavior:'smooth'}))" style="margin-left:auto;font-size:.8rem;color:var(--adm-red);text-decoration:underline;font-weight:600">Ver agora →</a>
      </div>

      <!-- Stats -->
      <div class="adm-stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
        <div class="adm-stat-card"><div><div class="adm-stat-val" id="kpi-total" data-count="0">0</div><div class="adm-stat-lbl">Total Denúncias</div></div><div class="adm-stat-icon adm-stat-icon--blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></div></div>
        <div class="adm-stat-card" style="border-color:rgba(245,158,11,.3)"><div><div class="adm-stat-val" id="kpi-pendentes" style="color:var(--adm-amber)" data-count="0">0</div><div class="adm-stat-lbl">Pendentes</div></div><div class="adm-stat-icon adm-stat-icon--amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div>
        <div class="adm-stat-card" style="border-color:rgba(239,68,68,.3)"><div><div class="adm-stat-val" id="kpi-alta" style="color:var(--adm-red)" data-count="0">0</div><div class="adm-stat-lbl">Alta Gravidade</div></div><div class="adm-stat-icon adm-stat-icon--red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div></div>
        <div class="adm-stat-card"><div><div class="adm-stat-val" id="kpi-resolvidas" style="color:var(--adm-accent)" data-count="0">0</div><div class="adm-stat-lbl">Resolvidas</div></div><div class="adm-stat-icon adm-stat-icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div></div>
      </div>

      <!-- Table -->
      <div class="adm-card">
        <div class="adm-filter-bar">
          <div class="adm-search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="rep-search" class="adm-search-input" placeholder="Buscar por anúncio ou denunciante..." oninput="filterTable('rep-search','rep-table')">
          </div>
          <select class="adm-select">
            <option>Todas as gravidades</option><option>Alta</option><option>Média</option><option>Baixa</option>
          </select>
          <select class="adm-select">
            <option>Todos os status</option><option>Pendente</option><option>Resolvida</option>
          </select>
          <button class="adm-btn adm-btn--danger adm-btn--sm" onclick="showToast('Todas as denúncias resolvidas!','success')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Resolver todas
          </button>
        </div>

        <div class="adm-table-wrap">
          <table class="adm-table" id="rep-table">
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th>Anúncio Denunciado</th>
                <th>Denunciante</th>
                <th>Motivo</th>
                <th>Gravidade</th>
                <th>Status</th>
                <th>Data</th>
                <th style="text-align:center">Ações</th>
              </tr>
            </thead>
            <tbody id="rep-tbody"></tbody>
          </table>
        </div>

        <div class="adm-pagination">
          <span class="adm-pag-info">Mostrando 1–5 de <strong>42</strong> denúncias</span>
          <div class="adm-pag-btns">
            <button class="adm-pag-btn">‹</button>
            <button class="adm-pag-btn active">1</button>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">2</button>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">3</button>
            <button class="adm-pag-btn">›</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/admin/js/admin.js?v=20240708_8"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  renderSidebar('denuncias.html');
  fetchAndRenderReports();
});

async function fetchAndRenderReports() {
  const headers = { 'apikey': ADM_SB_ANON, 'Authorization': `Bearer ${ADM_SB_ANON}` };
  try {
    const res = await fetch(
      `${ADM_SB_URL}/rest/v1/reports?select=id,ad_id,reason,severity,status,created_at,ads(title_pt),reporter:profiles!reports_reporter_id_fkey(name)&order=created_at.desc&limit=50`,
      { headers }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    // Exact KPIs via fetchCount (better than data.length if >50 reports)
    const total = await fetchCount('reports');
    const pending = await fetchCount('reports', 'status=eq.pending');
    const high = await fetchCount('reports', 'severity=eq.high');
    const resolved = await fetchCount('reports', 'status=eq.resolved');
    
    document.getElementById('kpi-total').dataset.count = total;
    document.getElementById('kpi-pendentes').dataset.count = pending;
    document.getElementById('kpi-alta').dataset.count = high;
    document.getElementById('kpi-resolvidas').dataset.count = resolved;
    
    // Alert Banner
    const alertBanner = document.getElementById('denuncia-alert');
    if (high > 0) {
      alertBanner.style.display = 'flex';
      document.getElementById('denuncia-alert-msg').textContent = `${high} denúncia${high > 1 ? 's' : ''} de alta gravidade requerem atenção imediata.`;
    } else {
      alertBanner.style.display = 'none';
    }
    
    if (window.animateCounters) window.animateCounters();

    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('rep-tbody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--adm-text-muted)">Nenhuma denúncia encontrada.</td></tr>';
      return;
    }

    const mapped = data.map(r => ({
      id:       r.id,
      ad:       r.ads?.title_pt || '(anúncio removido)',
      ad_id:    r.ad_id || null,
      reporter: r.reporter?.name || '(anônimo)',
      reason:   r.reason || '',
      severity: r.severity || 'low',
      status:   r.status || 'pending',
      date:     r.created_at ? new Date(r.created_at).toLocaleDateString('pt-BR') : '—',
    }));
    renderReportsTable(mapped);
  } catch (err) {
    console.warn('[denuncias] Supabase fetch failed:', err);
    document.getElementById('rep-tbody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--adm-text-muted)">Falha ao carregar denúncias. Verifique sua conexão com o banco de dados.</td></tr>';
  }
}

function renderReportsTable(reports) {
  document.getElementById('rep-tbody').innerHTML = reports.map(r => `
    <tr id="row-rep-${r.id}">
      <td style="font-weight:700;color:var(--adm-text-light)">#${r.id}</td>
      <td style="max-width:200px">
        <div style="font-weight:600;color:var(--adm-text);font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.ad}</div>
      </td>
      <td style="font-size:.85rem">${r.reporter}</td>
      <td style="font-size:.82rem;color:var(--adm-text-muted);max-width:160px">${r.reason}</td>
      <td>${severityBadge(r.severity)}</td>
      <td>${statusBadge(r.status)}</td>
      <td style="font-size:.8rem;color:var(--adm-text-muted)">${r.date}</td>
      <td>
        <div class="adm-actions" style="justify-content:center">
          <button class="adm-btn-icon adm-btn-icon--blue" onclick="viewAd(${r.ad_id})" title="Ver anúncio">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--red" onclick="deleteReportedAd(${r.ad_id}, ${r.id})" title="Remover anúncio">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--amber" onclick="warnSeller(${r.id})" title="Avisar vendedor">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--green" onclick="resolveReport(${r.id})" title="Marcar como resolvida">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="adm-btn-icon" onclick="dismissReport(${r.id})" title="Descartar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </td>
    </tr>
  `).join('');
}

function viewAd(adId) {
  if (adId) {
    window.open(`/anuncio.html?id=${adId}`, '_blank');
  } else {
    showToast('Anúncio não encontrado ou já removido.', 'error');
  }
}

async function deleteReportedAd(adId, reportId) {
  if (!adId) {
    showToast('O anúncio já foi removido.', 'error');
    return;
  }
  if (!(await admConfirm('Tem certeza que deseja excluir o anúncio e resolver a denúncia?'))) return;
  const session = JSON.parse(sessionStorage.getItem('tc_admin_session') || '{}');
  try {
    const resAd = await fetch(`${ADM_SB_URL}/rest/v1/ads?id=eq.${adId}`, {
      method: 'DELETE',
      headers: { 'apikey': ADM_SB_ANON, 'Authorization': `Bearer ${session.token || ADM_SB_ANON}` }
    });
    
    if (resAd.ok) {
      await fetch(`${ADM_SB_URL}/rest/v1/reports?id=eq.${reportId}`, {
        method: 'PATCH',
        headers: { 'apikey': ADM_SB_ANON, 'Authorization': `Bearer ${session.token || ADM_SB_ANON}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'resolved' })
      });
      showToast('Anúncio excluído e denúncia resolvida!', 'success');
      fetchAndRenderReports();
    } else {
      showToast('Erro ao excluir anúncio.', 'error');
    }
  } catch (err) {
    showToast('Erro de conexão.', 'error');
  }
}

async function warnSeller(reportId) {
  showToast('Aviso enviado ao vendedor.', 'warning');
  // Aqui você pode adicionar lógica para enviar e-mail ou notificação ao vendedor
}

async function resolveReport(id) {
  if (!(await admConfirm('Deseja marcar esta denúncia como resolvida?'))) return;
  const session = JSON.parse(sessionStorage.getItem('tc_admin_session') || '{}');
  try {
    const res = await fetch(`${ADM_SB_URL}/rest/v1/reports?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': ADM_SB_ANON, 'Authorization': `Bearer ${session.token || ADM_SB_ANON}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'resolved' })
    });
    if (res.ok) {
      showToast('Denúncia marcada como resolvida!', 'success');
      fetchAndRenderReports();
    } else {
      showToast('Erro ao atualizar denúncia.', 'error');
    }
  } catch (err) {
    showToast('Erro de conexão.', 'error');
  }
}

async function dismissReport(id) {
  if (!(await admConfirm('Deseja descartar (rejeitar) esta denúncia?'))) return;
  const session = JSON.parse(sessionStorage.getItem('tc_admin_session') || '{}');
  try {
    const res = await fetch(`${ADM_SB_URL}/rest/v1/reports?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': ADM_SB_ANON, 'Authorization': `Bearer ${session.token || ADM_SB_ANON}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'rejected' })
    });
    if (res.ok) {
      showToast('Denúncia descartada!', 'info');
      fetchAndRenderReports();
    } else {
      showToast('Erro ao atualizar denúncia.', 'error');
    }
  } catch (err) {
    showToast('Erro de conexão.', 'error');
  }
}
</script>
</body>
</html>
