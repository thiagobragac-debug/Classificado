<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <!-- Security headers (defence-in-depth, complements server-side headers) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificações de Vendedores — Admin Tauze Class</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316A34A'/%3E%3Ctext y='24' x='6' font-size='20' font-weight='800' fill='white' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E">
  <style>
    .doc-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 1px solid var(--adm-border); background: var(--adm-surface-3); margin-top: 8px; }
  </style>
</head>
<body>
<div class="adm-layout">
  <aside class="adm-sidebar" id="adm-sidebar"></aside>
  <div class="adm-main">
<div id="global-error-banner" style="display:none; background:red; color:white; padding:15px; font-weight:bold; z-index:9999; position:relative;"></div><script>
const escapeHTML = str => str ? String(str).replace(/[&<>'"]/g, tag => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
}[tag])) : '';
window.addEventListener('error', function(e) { const b = document.getElementById('global-error-banner'); if(b) { b.style.display = 'block'; const msg = document.createElement('div'); msg.textContent = e.message || 'Erro desconhecido'; b.appendChild(msg); } }); window.addEventListener('unhandledrejection', function(e) { const b = document.getElementById('global-error-banner'); if(b) { b.style.display = 'block'; const msg = document.createElement('div'); msg.textContent = typeof e.reason === 'string' ? e.reason : (e.reason?.message || 'Erro desconhecido'); b.appendChild(msg); } });</script>

    <header class="adm-topbar">
      <div class="adm-breadcrumb">
        <a href="/admin/index.html">Dashboard</a><span>›</span><strong>Verificações</strong>
      </div>
    </header>

    <main class="adm-content">
      <div class="adm-page-header">
        <h1 class="adm-page-title">Solicitações de Verificação</h1>
        <p class="adm-page-sub">Aprove ou rejeite os pedidos de Selo de Vendedor Verificado enviados pelos usuários.</p>
      </div>

      <!-- Verifications Table -->
      <div class="adm-card">
        <div style="overflow-x:auto">
          <table class="adm-table" style="width:100%;text-align:left">
            <thead>
              <tr>
                <th>Data</th>
                <th>Usuário</th>
                <th>Tipo</th>
                <th>Status</th>
                <th style="text-align:center">Ações</th>
              </tr>
            </thead>
            <tbody id="verifications-tbody">
              <tr><td colspan="5" style="text-align:center;padding:20px;color:var(--adm-text-muted)">Carregando verificações...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Analisar Verificação -->
<div class="adm-overlay" id="modal-verif" onclick="if(event.target===this)closeModal('modal-verif')">
  <div class="adm-modal" style="max-width:700px">
    <h3 class="adm-modal-title">🛡️ Analisar Verificação</h3>
    
    <input type="hidden" id="verif-id">
    <input type="hidden" id="verif-user-id">

    <div style="display:flex;gap:12px;margin-bottom:16px;background:var(--adm-surface-2);padding:12px;border-radius:8px">
      <div style="flex:1"><strong>Usuário:</strong> <span id="verif-user-name"></span></div>
      <div style="flex:1"><strong>Tipo:</strong> <span id="verif-type"></span></div>
      <div style="flex:1"><strong>Enviado em:</strong> <span id="verif-date"></span></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <label style="font-weight:600;font-size:0.85rem">Documento (RG/CNH/CNPJ)</label>
        <img id="verif-doc-img" class="doc-preview" src="" alt="Documento">
        <a id="verif-doc-link" href="#" target="_blank" style="display:block;margin-top:8px;font-size:0.85rem;color:var(--adm-primary)">Ver Original</a>
      </div>
      <div>
        <label style="font-weight:600;font-size:0.85rem">Foto (Selfie)</label>
        <img id="verif-selfie-img" class="doc-preview" src="" alt="Selfie">
        <a id="verif-selfie-link" href="#" target="_blank" style="display:block;margin-top:8px;font-size:0.85rem;color:var(--adm-primary)">Ver Original</a>
      </div>
    </div>

    <div class="adm-field" style="margin-top:20px">
      <label>Notas do Administrador (Visível para o usuário em caso de rejeição)</label>
      <textarea class="adm-textarea" id="verif-notes" placeholder="Se for rejeitar, explique o motivo..."></textarea>
    </div>

    <div class="adm-modal-footer" style="margin-top:24px;justify-content:space-between">
      <button class="adm-btn adm-btn--outline" onclick="closeModal('modal-verif')">Cancelar</button>
      <div style="display:flex;gap:12px">
        <button class="adm-btn" style="background:var(--adm-red);color:white;border:none" onclick="updateStatus('rejected')">❌ Rejeitar</button>
        <button class="adm-btn adm-btn--primary" onclick="updateStatus('approved')">✅ Aprovar Selo</button>
      </div>
    </div>
  </div>
</div>

<script src="/admin/js/admin.js?v=20240708_8"></script>
<script>
  let verificationsData = [];

  document.addEventListener('DOMContentLoaded', () => {
    checkAuth();
    renderSidebar('verificacoes.html');
    fetchVerifications();
  });

  async function fetchVerifications() {
    const raw = sessionStorage.getItem('tc_admin_session');
    const session = raw ? JSON.parse(raw) : null;
    const token = session ? session.token : ADM_SB_ANON;
    
    const headers = { 'apikey': ADM_SB_ANON, 'Authorization': `Bearer ${getAdminToken()}` };
    try {
      // Faz o join com a tabela profiles para pegar o nome
      const res = await fetch(`${ADM_SB_URL}/rest/v1/profiles?select=id,name,kyc_status,profile_secrets(kyc_doc_url,kyc_selfie_url),updated_at&kyc_status=in.(pending,approved,rejected)&order=updated_at.desc`, { headers });
      if (!res.ok) throw new Error('Falha ao carregar');
      verificationsData = await res.json();
      renderTable(verificationsData);
    } catch (e) {
      console.error(e);
      document.getElementById('verifications-tbody').innerHTML = `<tr><td colspan="5" style="text-align:center;padding:20px;color:red">Erro ao carregar dados.</td></tr>`;
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('verifications-tbody');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;">Nenhuma solicitação encontrada.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(v => {
      let statusBadge = '';
      if (v.kyc_status === 'pending') statusBadge = '<span class="adm-badge adm-badge--amber">Pendente</span>';
      else if (v.kyc_status === 'approved') statusBadge = '<span class="adm-badge adm-badge--featured">Aprovado</span>';
      else statusBadge = '<span class="adm-badge" style="background:var(--adm-red);color:white">Rejeitado</span>';

      const userName = v.name || 'Usuário ' + v.id.substring(0,6);
      const dateStr = v.updated_at ? new Date(v.updated_at).toLocaleDateString('pt-BR') : '-';
      const typeStr = 'Identidade';

      return `
      <tr>
        <td style="color:var(--adm-text-muted);font-size:0.85rem">${dateStr}</td>
        <td style="font-weight:600">${userName}</td>
        <td>${typeStr}</td>
        <td>${statusBadge}</td>
        <td>
          <div class="adm-actions" style="justify-content:center">
            <button class="adm-btn-icon adm-btn-icon--blue" onclick="openVerif('${v.id}')" title="Analisar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </td>
      </tr>
      `;
    }).join('');
  }

  function openVerif(id) {
    const v = verificationsData.find(x => x.id === id);
    if (!v) return;

    document.getElementById('verif-id').value = v.id;
    document.getElementById('verif-user-id').value = v.id; // user_id is id for profiles
    document.getElementById('verif-user-name').textContent = v.name || 'Desconhecido';
    document.getElementById('verif-type').textContent = 'Identidade KYC';
    document.getElementById('verif-date').textContent = v.updated_at ? new Date(v.updated_at).toLocaleString('pt-BR') : '-';

    // Resolves the internal path.
    const extractPath = (val, fallback) => {
      if (!val) return fallback;
      if (val.startsWith('http')) {
        const parts = val.split('kyc-docs/');
        return parts.length > 1 ? parts[1] : fallback;
      }
      return val;
    };

    // Tenta pegar da nova tabela profile_secrets, se não existir cai pra coluna antiga (temporário)
    const docUrl = (v.profile_secrets && v.profile_secrets.kyc_doc_url) || v.kyc_doc_url;
    const selfieUrl = (v.profile_secrets && v.profile_secrets.kyc_selfie_url) || v.kyc_selfie_url;

    const docPath = extractPath(docUrl, `${v.id}/doc.jpg`);
    const selfiePath = extractPath(selfieUrl, `${v.id}/selfie.jpg`);

    // Fetch signed URL securely using Admin Token
    async function loadSignedUrl(path, imgId, linkId) {
      const img = document.getElementById(imgId);
      try {
        img.src = '';
        img.alt = 'Gerando Acesso...';
        const res = await fetch(`${ADM_SB_URL}/storage/v1/object/sign/kyc-docs/${path}`, {
          method: 'POST',
          headers: { 
            'apikey': ADM_SB_ANON,
            'Authorization': `Bearer ${getAdminToken()}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ expiresIn: 60 })
        });
        
        if (res.ok) {
          const data = await res.json();
          // Fallback to data.signedUrl if data.signedURL is undefined
          let urlStr = data.signedURL || data.signedUrl;
          if (!urlStr.startsWith('/storage/v1')) {
            urlStr = urlStr.startsWith('/') ? `/storage/v1${urlStr}` : `/storage/v1/${urlStr}`;
          }
          const signedUrl = `${ADM_SB_URL}${urlStr}`;
          img.src = signedUrl;
          document.getElementById(linkId).href = signedUrl;
        } else {
          const errText = await res.text();
          console.error('[Admin] Sign Error:', res.status, errText);
          img.alt = `Erro ${res.status}: ${errText}`;
          img.style.border = '2px solid red';
        }
      } catch (e) {
        console.error('[Admin] Fetch Error:', e);
        img.alt = `Erro de Conexão: ${e.message}`;
        img.style.border = '2px solid red';
      }
    }

    loadSignedUrl(docPath, 'verif-doc-img', 'verif-doc-link');
    loadSignedUrl(selfiePath, 'verif-selfie-img', 'verif-selfie-link');

    document.getElementById('verif-notes').value = ''; 
    openModal('modal-verif');
  }

  async function updateStatus(newStatus) {
    const id = document.getElementById('verif-id').value;
    const raw = sessionStorage.getItem('tc_admin_session');
    const session = raw ? JSON.parse(raw) : null;
    const token = session ? session.token : ADM_SB_ANON;

    const headers = {
      'apikey': ADM_SB_ANON,
      'Authorization': `Bearer ${getAdminToken()}`,
      'Content-Type': 'application/json'
    };

    try {
      const btn = document.querySelector(`button[onclick="updateStatus('${newStatus}')"]`);
      const originalText = btn ? btn.textContent : 'Processar';
      if(btn) { btn.textContent = 'Processando...'; btn.disabled = true; }

      // Update kyc_status on profiles table
      const res = await fetch(`${ADM_SB_URL}/rest/v1/profiles?id=eq.${id}`, {
        method: 'PATCH',
        headers,
        body: JSON.stringify({ 
          kyc_status: newStatus
        })
      });
      if (!res.ok) throw new Error('Erro ao atualizar perfil do usuário');

      showToast(`Verificação ${newStatus === 'approved' ? 'aprovada' : 'rejeitada'} com sucesso!`, 'success');
      closeModal('modal-verif');
      fetchVerifications();
      
      if(btn) { btn.textContent = originalText; btn.disabled = false; }

    } catch (e) {
      console.error(e);
      showToast('Erro ao processar solicitação.', 'error');
      
      const btn = document.querySelector(`button[onclick="updateStatus('${newStatus}')"]`);
      if(btn) { btn.textContent = newStatus === 'approved' ? '✅ Aprovar Selo' : '❌ Rejeitar'; btn.disabled = false; }
    }
  }
</script>
</body>
</html>
