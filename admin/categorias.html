<div id="global-error-banner" style="display:none; background:red; color:white; padding:15px; font-weight:bold; z-index:9999; position:relative;"></div><script>
const escapeHTML = str => str ? String(str).replace(/[&<>'"]/g, tag => ({

window.addEventListener('error', function(e) { const b = document.getElementById('global-error-banner'); if(b) { b.style.display = 'block'; const msg = document.createElement('div'); msg.textContent = e.message || 'Erro desconhecido'; b.appendChild(msg); } }); window.addEventListener('unhandledrejection', function(e) { const b = document.getElementById('global-error-banner'); if(b) { b.style.display = 'block'; const msg = document.createElement('div'); msg.textContent = typeof e.reason === 'string' ? e.reason : (e.reason?.message || 'Erro desconhecido'); b.appendChild(msg); } });</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/admin/js/admin.js?v=20240708_8"></script>
<script>
let currentEditCat = null;

const dictES = {
  'bovinos': 'Bovinos', 'equinos': 'Equinos', 'suínos': 'Porcinos', 'suinos': 'Porcinos',
  'ovinos': 'Ovinos', 'aves': 'Aves', 'insumos': 'Insumos', 'máquinas': 'Maquinaria',
  'maquinas': 'Maquinaria', 'imóveis': 'Inmuebles', 'imoveis': 'Inmuebles', 'genética': 'Genética',
  'genetica': 'Genética', 'aquicultura': 'Acuicultura', 'serviços': 'Servicios', 'servicos': 'Servicios',
  'outros': 'Otros', 'caprinos': 'Caprinos', 'sementes': 'Semillas', 'tratores': 'Tractores'
};

function autoTranslate(ptId, esId) {
  const ptVal = document.getElementById(ptId).value;
  const esEl = document.getElementById(esId);
  if (!ptVal) { esEl.value = ''; return; }
  const lower = ptVal.toLowerCase().trim();
  esEl.value = dictES[lower] || ptVal;
}

function syncCatsToStorage() {
  localStorage.setItem('tc_admin_cats', JSON.stringify(ADMIN_CATS));
}

document.addEventListener('DOMContentLoaded', async () => {
  checkAuth();
  renderSidebar('categorias.html');
  await loadAdminCategories();
});

async function updateTopStats() {
  let active = 0, inactive = 0;
  ADMIN_CATS.forEach(c => {
    if (c.active) active++; else inactive++;
  });
  
  const elTotal = document.getElementById('stat-total-cat');
  const elActive = document.getElementById('stat-active-cat');
  const elInactive = document.getElementById('stat-inactive-cat');
  const elAds = document.getElementById('stat-total-ads');
  
  if (elTotal) elTotal.innerText = ADMIN_CATS.length;
  if (elActive) elActive.innerText = active;
  if (elInactive) elInactive.innerText = inactive;
  
  if (elAds) {
    const totalAds = await fetchCount('ads');
    if (totalAds >= 1000) {
      elAds.innerText = (totalAds/1000).toFixed(1) + 'k';
    } else {
      elAds.innerText = totalAds.toLocaleString('pt-BR');
    }
  }
}

async function loadAdminCategories() {
  try {
    const sb = typeof getSupabase === 'function' ? getSupabase() : null;
    if (!sb) return;
    
    // Fetch categories
    const { data: catData, error: catError } = await sb.from('categories').select('id, name_pt, name_es, icon, color, active, sort_order').order('sort_order', { ascending: true });
    if (catError) throw catError;
    
    ADMIN_CATS.length = 0;
    if (catData) {
      catData.forEach(c => {
        ADMIN_CATS.push({
          id: c.id,
          name: c.name_pt,
          nameEs: c.name_es,
          icon: c.icon,
          color: c.color,
          bg: c.color + '22',
          active: c.active,
          ads: 0,
          sort_order: c.sort_order
        });
      });
    }

    // Fetch counts
    const { data: counts, error: countsError } = await sb.rpc('get_category_counts');
    if (!countsError && counts) {
      const countMap = {};
      counts.forEach(r => { if (r.category_id) countMap[r.category_id] = Number(r.total); });
      ADMIN_CATS.forEach(cat => {
         const realCount = countMap[cat.id] ?? countMap['cat-' + cat.id] ?? 0;
         cat.ads = realCount; 
      });
    }
    
    renderCatsGrid();
    updateTopStats();
  } catch (e) {
    console.error('Erro ao buscar estatísticas de categorias:', e);
  }
}

function renderCatsGrid() {
  const grid = document.getElementById('cats-grid');
  grid.innerHTML = ADMIN_CATS.map((cat, idx) => `
    <div class="adm-cat-card${cat.active?'':' adm-cat-card--inactive'}" 
         style="${cat.active?'':'opacity:.55;filter:grayscale(.5)'}; cursor: grab;"
         draggable="true" 
         ondragstart="catDragStart(event, ${idx})" 
         ondragover="catDragOver(event)" 
         ondrop="catDrop(event, ${idx})"
         ondragend="catDragEnd(event)">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="adm-cat-icon" style="background:${cat.bg};font-size:1.4rem">${cat.icon}</div>
        <label class="adm-toggle" title="${cat.active?'Desativar':'Ativar'} categoria">
          <input type="checkbox" ${cat.active?'checked':''} onchange="toggleCat('${cat.id}',this)">
          <span class="adm-toggle-slider"></span>
        </label>
      </div>
      <div>
        <div class="adm-cat-name">${cat.name}</div>
        <div class="adm-cat-count">${cat.ads.toLocaleString('pt-BR')} anúncios</div>
      </div>
      <div class="adm-cat-footer">
        <span class="adm-badge ${cat.active?'adm-badge--active':'adm-badge--rejected'}">${cat.active?'Ativa':'Inativa'}</span>
        <button class="adm-btn-icon adm-btn-icon--blue" onclick="editCat('${cat.id}')" title="Editar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

let draggedCatIdx = null;

function catDragStart(e, idx) {
  draggedCatIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', idx);
  e.target.style.opacity = '0.5';
}

function catDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function catDrop(e, targetIdx) {
  e.preventDefault();
  if (draggedCatIdx === null || draggedCatIdx === targetIdx) return;
  
  const item = ADMIN_CATS.splice(draggedCatIdx, 1)[0];
  ADMIN_CATS.splice(targetIdx, 0, item);
  
  renderCatsGrid();
  document.getElementById('btn-save-order').style.display = 'block';
}

async function saveCategoryOrder() {
  const sb = typeof getSupabase === 'function' ? getSupabase() : null;
  if (!sb) return;
  const updates = ADMIN_CATS.map((c, idx) => ({
    id: c.id,
    name_pt: c.name,
    name_es: c.nameEs || c.name,
    icon: c.icon,
    color: c.color,
    active: c.active,
    sort_order: idx
  }));
  try {
    const { error } = await sb.from('categories').upsert(updates);
    if (error) throw error;
    document.getElementById('btn-save-order').style.display = 'none';
    showToast('Ordem das categorias salva com sucesso!', 'success');
  } catch (e) {
    console.error(e);
    showToast('Erro ao salvar a ordem no banco', 'error');
  }
}

function catDragEnd(e) {
  e.target.style.opacity = '';
  draggedCatIdx = null;
}

async function toggleCat(id, checkbox) {
  const cat = ADMIN_CATS.find(c=>c.id===id);
  if (!cat) return;
  cat.active = checkbox.checked;
  const sb = typeof getSupabase === 'function' ? getSupabase() : null;
  if (sb) {
    const { error } = await sb.from('categories').update({ active: cat.active }).eq('id', id);
    if (error) {
      showToast('Erro ao atualizar categoria', 'error');
      cat.active = !checkbox.checked;
      checkbox.checked = cat.active;
      return;
    }
  }
  showToast(`Categoria "${cat.name}" ${cat.active?'ativada':'desativada'}.`, cat.active?'success':'warning');
  renderCatsGrid();
  updateTopStats();
}

function editCat(id) {
  currentEditCat = ADMIN_CATS.find(c=>c.id===id);
  if (!currentEditCat) return;
  document.getElementById('edit-cat-name-pt').value = currentEditCat.name;
  document.getElementById('edit-cat-name-es').value = currentEditCat.name;
  document.getElementById('edit-cat-icon').value = currentEditCat.icon;
  document.getElementById('edit-cat-color').value = currentEditCat.color;
  openModal('modal-edit-cat');
}

async function saveEditCategory() {
  if (!currentEditCat) return;
  const namePt = document.getElementById('edit-cat-name-pt').value.trim();
  const nameEs = document.getElementById('edit-cat-name-es').value.trim();
  const icon = document.getElementById('edit-cat-icon').value.trim();
  const color = document.getElementById('edit-cat-color').value;
  
  const sb = typeof getSupabase === 'function' ? getSupabase() : null;
  if (sb) {
    const { error } = await sb.from('categories').update({
      name_pt: namePt,
      name_es: nameEs,
      icon: icon,
      color: color
    }).eq('id', currentEditCat.id);
    if (error) {
      showToast('Erro ao salvar categoria', 'error');
      return;
    }
  }
  
  currentEditCat.name = namePt;
  currentEditCat.nameEs = nameEs;
  currentEditCat.icon = icon;
  currentEditCat.color = color;
  currentEditCat.bg = color + '22';
  
  closeModal('modal-edit-cat');
  renderCatsGrid();
  showToast(`Categoria "${currentEditCat.name}" atualizada!`, 'success');
}

async function saveNewCategory() {
  const name = document.getElementById('new-cat-name-pt').value.trim();
  const nameEs = document.getElementById('new-cat-name-es').value.trim();
  const icon = document.getElementById('new-cat-icon').value.trim() || '📦';
  const color = document.getElementById('new-cat-color').value;
  if (!name) { showToast('Informe um nome para a categoria.','warning'); return; }
  
  const id = name.toLowerCase().replace(/\s/g,'_');
  const maxOrder = ADMIN_CATS.length > 0 ? Math.max(...ADMIN_CATS.map(c => c.sort_order || 0)) : 0;
  const newOrder = maxOrder + 1;
  
  const sb = typeof getSupabase === 'function' ? getSupabase() : null;
  if (sb) {
    const { error } = await sb.from('categories').insert({
      id, name_pt: name, name_es: nameEs || name, icon, color, active: true, sort_order: newOrder
    });
    if (error) {
      showToast('Erro ao criar categoria no banco', 'error');
      console.error(error);
      return;
    }
  }
  
  ADMIN_CATS.push({ id, name, nameEs, icon, color, bg: color+'22', ads: 0, active: true, sort_order: newOrder });
  closeModal('modal-nova-cat');
  
  renderCatsGrid();
  updateTopStats();
  showToast(`Categoria "${name}" criada com sucesso!`, 'success');
  document.getElementById('new-cat-name-pt').value = '';
  document.getElementById('new-cat-name-es').value = '';
  document.getElementById('new-cat-icon').value = '';
}
</script>
