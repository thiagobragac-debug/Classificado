<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Tauze Class</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316A34A'/%3E%3Ctext y='24' x='6' font-size='20' font-weight='800' fill='white' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100svh; background: var(--adm-bg); }
    .login-card {
      width: 100%; max-width: 400px;
      background: var(--adm-surface); border: 1px solid var(--adm-border);
      border-radius: var(--adm-r-xl); padding: 40px 36px;
      box-shadow: var(--adm-shadow-lg);
      animation: fadeUp .4s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .login-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--adm-text); margin-bottom: 4px; }
    .login-sub   { font-size: .8rem; color: var(--adm-text-light); }
    .login-error { background: var(--adm-red-pale); border: 1px solid var(--adm-red); border-radius: var(--adm-r-md); padding: 10px 14px; font-size: .83rem; color: var(--adm-red); margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="adm-logo-mark">TC</div>
    <div>
      <div class="adm-logo-name" style="font-size:1.05rem">Tauze Class</div>
      <div class="adm-logo-sub">Painel Administrativo</div>
    </div>
  </div>
  <div class="login-title">Acesso Restrito</div>
  <p class="login-sub" style="margin-bottom:28px">Entre com suas credenciais de administrador</p>

  <div class="login-error" id="login-error">
    ❌ E-mail ou senha incorretos. Tente novamente.
  </div>

  <form onsubmit="handleLogin(event)">
    <div class="adm-field">
      <label>E-mail</label>
      <div style="position:relative">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--adm-text-light)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="login-email" class="adm-input" style="padding-left:34px" value="admin@tauzeclass.com" required placeholder="admin@tauzeclass.com">
      </div>
    </div>
    <div class="adm-field">
      <label>Senha</label>
      <div style="position:relative">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--adm-text-light)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="login-pass" class="adm-input" style="padding-left:34px" required placeholder="••••••••">
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <label style="display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--adm-text-muted);cursor:pointer">
        <input type="checkbox" checked style="accent-color:var(--adm-accent)"> Manter conectado
      </label>
      <a href="#" style="font-size:.8rem;color:var(--adm-accent);font-weight:600">Esqueci a senha</a>
    </div>
    <button type="submit" class="adm-btn adm-btn--primary" id="login-btn" style="width:100%;justify-content:center;height:42px;font-size:.9rem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Entrar no Painel
    </button>
  </form>

  <p style="text-align:center;margin-top:28px;font-size:.72rem;color:var(--adm-text-light)">
    Tauze Class © 2026 — Painel Administrativo
  </p>
</div>

<script src="/admin/js/admin.js"></script>
<script>
  // Redirect if already logged in
  if (sessionStorage.getItem('tc_admin_session')) location.href = 'index.html';

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.textContent = 'Verificando...';
    btn.disabled = true;

    try {
      const ok = await adminLogin(
        document.getElementById('login-email').value,
        document.getElementById('login-pass').value
      );
      if (ok) {
        btn.innerHTML = '✓ Acesso liberado! Redirecionando...';
        btn.style.background = 'linear-gradient(135deg,#22C55E,#16A34A)';
        setTimeout(() => location.href = 'index.html', 800);
      } else {
        document.getElementById('login-error').style.display = 'block';
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Entrar no Painel';
        btn.disabled = false;
      }
    } catch (err) {
      document.getElementById('login-error').style.display = 'block';
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Entrar no Painel';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
