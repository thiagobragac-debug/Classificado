<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — Admin Tauze Class</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316A34A'/%3E%3Ctext y='24' x='6' font-size='20' font-weight='800' fill='white' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="adm-layout">
  <aside class="adm-sidebar" id="adm-sidebar"></aside>
  <div class="adm-main">

    <header class="adm-topbar">
      <div class="adm-breadcrumb">
        <a href="/admin/index.html">Dashboard</a><span>›</span><strong>Usuários</strong>
      </div>
      <div class="adm-topbar-right">
        <button class="adm-topbar-btn" title="Notificações" onclick="showToast('Sem novas notificações', 'info')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
      </div>
    </header>

    <main class="adm-content">
      <div class="adm-page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h1 class="adm-page-title">Gerenciar Usuários</h1>
          <p class="adm-page-sub">Verifique, bloqueie e gerencie os usuários do portal.</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="adm-btn adm-btn--outline" onclick="showToast('Exportando usuários...','info')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar CSV
          </button>
          <button class="adm-btn adm-btn--primary" onclick="showToast('Convite em breve','info')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Convidar Usuário
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="adm-stats-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px">
        <div class="adm-stat-card"><div><div class="adm-stat-val" data-count="18203">0</div><div class="adm-stat-lbl">Total</div></div><div class="adm-stat-icon adm-stat-icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div></div>
        <div class="adm-stat-card"><div><div class="adm-stat-val" style="color:var(--adm-amber)" data-count="2841">0</div><div class="adm-stat-lbl">Premium</div></div><div class="adm-stat-icon adm-stat-icon--amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div></div>
        <div class="adm-stat-card"><div><div class="adm-stat-val" style="color:var(--adm-blue)" data-count="5220">0</div><div class="adm-stat-lbl">Pro</div></div><div class="adm-stat-icon adm-stat-icon--blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div></div>
        <div class="adm-stat-card"><div><div class="adm-stat-val" data-count="10142">0</div><div class="adm-stat-lbl">Grátis</div></div><div class="adm-stat-icon adm-stat-icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div>
        <div class="adm-stat-card"><div><div class="adm-stat-val" style="color:var(--adm-red)" data-count="127">0</div><div class="adm-stat-lbl">Bloqueados</div></div><div class="adm-stat-icon adm-stat-icon--red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div></div>
      </div>

      <!-- Table -->
      <div class="adm-card">
        <div class="adm-filter-bar">
          <div class="adm-search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="users-search" class="adm-search-input" placeholder="Buscar por nome ou e-mail..." oninput="filterTable('users-search','users-table')">
          </div>
          <select class="adm-select">
            <option>Todos os status</option><option>Ativo</option><option>Bloqueado</option><option>Pendente verificação</option>
          </select>
          <select class="adm-select">
            <option>Todos os países</option><option>🇧🇷 Brasil</option><option>🇦🇷 Argentina</option><option>🇺🇾 Uruguai</option><option>🇵🇾 Paraguai</option>
          </select>
          <select class="adm-select">
            <option>Todos os planos</option><option>Premium</option><option>Pro</option><option>Grátis</option>
          </select>
        </div>

        <div class="adm-table-wrap">
          <table class="adm-table" id="users-table">
            <thead>
              <tr>
                <th style="width:40px"><input type="checkbox" style="accent-color:var(--adm-accent)"></th>
                <th>Usuário</th>
                <th>País</th>
                <th>Plano</th>
                <th style="text-align:center">Anúncios</th>
                <th>Status</th>
                <th>Cadastro</th>
                <th style="text-align:center">Ações</th>
              </tr>
            </thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>

        <div class="adm-pagination">
          <span class="adm-pag-info">Mostrando 1–10 de <strong>18.203</strong> usuários</span>
          <div class="adm-pag-btns">
            <button class="adm-pag-btn">‹</button>
            <button class="adm-pag-btn active">1</button>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">2</button>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">3</button>
            <span style="color:var(--adm-text-light);line-height:32px;padding:0 4px">…</span>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">1821</button>
            <button class="adm-pag-btn">›</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/admin/js/admin.js"></script>
<script>
const PLAN_BADGES = {
  Premium: `<span class="adm-badge adm-badge--featured">⭐ Premium</span>`,
  Pro:     `<span class="adm-badge adm-badge--verified">🔷 Pro</span>`,
  'Grátis':`<span class="adm-badge" style="background:var(--adm-surface-3);color:var(--adm-text-muted)">Grátis</span>`,
};

document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  renderSidebar('usuarios.html');
  renderUsersTable(ADMIN_USERS);
});

function renderUsersTable(users) {
  document.getElementById('users-tbody').innerHTML = users.map(u => {
    const initials = u.name.split(' ').map(w=>w[0]).slice(0,2).join('');
    const statusColor = { active:'var(--adm-accent)', blocked:'var(--adm-red)', pending:'var(--adm-amber)' }[u.status] || 'var(--adm-text-muted)';
    return `
    <tr id="row-user-${u.id}">
      <td><input type="checkbox" style="accent-color:var(--adm-accent)"></td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--adm-accent),var(--adm-accent-dark));display:grid;place-items:center;font-weight:700;font-size:.8rem;color:white;flex-shrink:0">${initials}</div>
          <div>
            <div style="font-weight:600;color:var(--adm-text);font-size:.85rem">
              ${u.name}
              ${u.verified ? '<span style="color:var(--adm-blue);font-size:.7rem;margin-left:4px" title="Verificado">✓</span>' : ''}
            </div>
            <div style="font-size:.72rem;color:var(--adm-text-light)">${u.email}</div>
          </div>
        </div>
      </td>
      <td style="font-size:.85rem">${u.country}</td>
      <td>${PLAN_BADGES[u.plan]||u.plan}</td>
      <td style="text-align:center;font-weight:600;color:var(--adm-text)">${u.ads}</td>
      <td>${statusBadge(u.status)}</td>
      <td style="font-size:.8rem;color:var(--adm-text-muted)">${u.joined}</td>
      <td>
        <div class="adm-actions" style="justify-content:center">
          <button class="adm-btn-icon adm-btn-icon--green" onclick="verifyUser(${u.id})" title="Verificar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--amber" onclick="blockUser(${u.id})" title="${u.status==='blocked'?'Desbloquear':'Bloquear'}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--blue" onclick="showToast('Ver anúncios de ${u.name.split(' ')[0]}','info')" title="Ver anúncios">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--red" onclick="deleteUser(${u.id})" title="Excluir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
