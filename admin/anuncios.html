<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anúncios — Admin Tauze Class</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316A34A'/%3E%3Ctext y='24' x='6' font-size='20' font-weight='800' fill='white' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="adm-layout">
  <aside class="adm-sidebar" id="adm-sidebar"></aside>
  <div class="adm-main">

    <header class="adm-topbar">
      <div class="adm-breadcrumb">
        <a href="/admin/index.html">Dashboard</a>
        <span>›</span>
        <strong>Anúncios</strong>
      </div>
      <div class="adm-topbar-right">
        <button class="adm-topbar-btn" title="Notificações" onclick="showToast('Sem novas notificações', 'info')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="adm-notif-dot"></span>
        </button>
      </div>
    </header>

    <main class="adm-content">
      <div class="adm-page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h1 class="adm-page-title">Gerenciar Anúncios</h1>
          <p class="adm-page-sub">Aprove, destaque ou remova anúncios do portal.</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="adm-btn adm-btn--outline" onclick="showToast('Exportação em andamento...','info')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar CSV
          </button>
          <button class="adm-btn adm-btn--primary" onclick="openNewAdModal()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo Anúncio
          </button>
        </div>
      </div>

      <!-- Mini Stats -->
      <div class="adm-stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
        <div class="adm-stat-card">
          <div><div class="adm-stat-val" data-count="62847">0</div><div class="adm-stat-lbl">Total</div></div>
          <div class="adm-stat-icon adm-stat-icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
        </div>
        <div class="adm-stat-card">
          <div><div class="adm-stat-val" style="color:var(--adm-accent)" data-count="58230">0</div><div class="adm-stat-lbl">Ativos</div></div>
          <div class="adm-stat-icon adm-stat-icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>
        <div class="adm-stat-card">
          <div><div class="adm-stat-val" style="color:var(--adm-amber)" data-count="5">0</div><div class="adm-stat-lbl">Pendentes</div></div>
          <div class="adm-stat-icon adm-stat-icon--amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        </div>
        <div class="adm-stat-card">
          <div><div class="adm-stat-val" style="color:var(--adm-red)" data-count="3">0</div><div class="adm-stat-lbl">Rejeitados</div></div>
          <div class="adm-stat-icon adm-stat-icon--red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
        </div>
      </div>

      <!-- Table Card -->
      <div class="adm-card">
        <!-- Filters -->
        <div class="adm-filter-bar">
          <div class="adm-search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="ads-search" class="adm-search-input" placeholder="Buscar por título ou vendedor..."
                   oninput="filterTable('ads-search','ads-table')">
          </div>
          <select class="adm-select" onchange="filterByStatus(this.value)">
            <option value="">Todos os status</option>
            <option value="active">Ativo</option>
            <option value="pending">Pendente</option>
            <option value="rejected">Rejeitado</option>
            <option value="featured">Destaque</option>
          </select>
          <select class="adm-select" onchange="filterByCategory(this.value)" id="cat-filter">
            <option value="">Todas as categorias</option>
          </select>
          <select class="adm-select" onchange="filterByCountry(this.value)">
            <option value="">Todos os países</option>
            <option>Brasil</option><option>Argentina</option><option>Uruguai</option><option>Paraguai</option>
          </select>
        </div>

        <!-- Table -->
        <div class="adm-table-wrap">
          <table class="adm-table" id="ads-table">
            <thead>
              <tr>
                <th style="width:40px"><input type="checkbox" style="accent-color:var(--adm-accent)" onclick="toggleAll(this)"></th>
                <th>Anúncio</th>
                <th>Vendedor</th>
                <th>Preço</th>
                <th>País</th>
                <th>Status</th>
                <th>Data</th>
                <th style="text-align:center">Ações</th>
              </tr>
            </thead>
            <tbody id="ads-tbody"></tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="adm-pagination">
          <span class="adm-pag-info">Mostrando 1–12 de <strong>62.847</strong> anúncios</span>
          <div class="adm-pag-btns">
            <button class="adm-pag-btn">‹</button>
            <button class="adm-pag-btn active">1</button>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">2</button>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">3</button>
            <span style="color:var(--adm-text-light);line-height:32px;padding:0 4px">…</span>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">5240</button>
            <button class="adm-pag-btn" onclick="showToast('Navegação em breve','info')">›</button>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Modal Novo Anúncio -->
<div id="newAdModal" class="adm-modal">
  <div class="adm-modal-content" style="max-width: 500px;">
    <div class="adm-modal-header">
      <h3 class="adm-modal-title">Novo Anúncio (Admin)</h3>
      <button class="adm-modal-close" onclick="closeModal('newAdModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="adm-modal-body">
      <form id="newAdForm" onsubmit="saveNewAd(event)">
        <div class="adm-form-group">
          <label class="adm-form-label">Título do Anúncio</label>
          <input type="text" id="newAdTitle" class="adm-input" required>
        </div>
        <div class="adm-form-group">
          <label class="adm-form-label">Vendedor</label>
          <input type="text" id="newAdSeller" class="adm-input" required>
        </div>
        <div class="adm-form-group">
          <label class="adm-form-label">Plano</label>
          <select id="newAdPlan" class="adm-select" required>
            <option value="normal">Normal (Gratuito)</option>
            <option value="premium">Premium (Destaque)</option>
          </select>
          <p style="font-size:0.8rem;color:var(--adm-text-light);margin-top:4px;">Anúncios Premium aparecem no topo da listagem.</p>
        </div>
        <div class="adm-modal-footer">
          <button type="button" class="adm-btn adm-btn--outline" onclick="closeModal('newAdModal')">Cancelar</button>
          <button type="submit" class="adm-btn adm-btn--primary">Criar Anúncio</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="/admin/js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  renderSidebar('anuncios.html');

  // Populate category filter
  const catSel = document.getElementById('cat-filter');
  ADMIN_CATS.forEach(c => { const o = document.createElement('option'); o.value = c.name; o.textContent = c.name; catSel.appendChild(o); });

  fetchAndRenderAds();
});

async function fetchAndRenderAds() {
  const SB_URL = 'https://rfzuzuobwuanmbrcthqe.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmenV6dW9id3Vhbm1icmN0aHFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNzg1OTMsImV4cCI6MjA5ODY1NDU5M30.m-Mop7RgpVo730lwjcra1egF8p9APv6AGnW1YnFvOgY';
  const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };
  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/ads?select=id,title_pt,category_id,price,currency,status,featured,views_count,created_at,country,images,profiles(name)&order=created_at.desc&limit=50`,
      { headers }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('no data');
    const mapped = data.map(ad => ({
      id:       ad.id,
      title:    ad.title_pt || '(sem título)',
      category: ad.category_id || '',
      seller:   ad.profiles?.name || '(desconhecido)',
      price:    (ad.currency || '') + ' ' + (ad.price != null ? Number(ad.price).toLocaleString('pt-BR') : '—'),
      status:   ad.status || 'active',
      featured: !!ad.featured,
      country:  ad.country || '',
      image:    Array.isArray(ad.images) && ad.images.length ? ad.images[0] : '',
      date:     ad.created_at ? new Date(ad.created_at).toLocaleDateString('pt-BR') : '—',
      reports:  0,
    }));
    renderAdsTable(mapped);
    showToast(`${mapped.length} anúncios carregados do Supabase`, 'success');
  } catch (err) {
    console.warn('[anuncios] Supabase fetch failed, using mock data:', err);
    renderAdsTable(ADMIN_ADS);
  }
}

function renderAdsTable(ads) {
  document.getElementById('ads-tbody').innerHTML = ads.map(ad => {
    const title = escapeHTML(ad.title);
    const category = escapeHTML(ad.category);
    const seller = escapeHTML(ad.seller);
    const country = escapeHTML(ad.country);
    return `
    <tr id="row-ad-${ad.id}">
      <td><input type="checkbox" style="accent-color:var(--adm-accent)"></td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <img src="${escapeHTML(ad.image)}" alt="" style="width:44px;height:36px;border-radius:6px;object-fit:cover;background:var(--adm-surface-2)" onerror="this.style.background='var(--adm-surface-3)'">
          <div>
            <div style="font-weight:600;color:var(--adm-text);font-size:.85rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              ${ad.featured ? '<span style="color:var(--adm-amber);margin-right:4px">★</span>' : ''}${title}
            </div>
            <div style="font-size:.72rem;color:var(--adm-text-light);margin-top:2px">${category}</div>
          </div>
        </div>
      </td>
      <td>${seller}</td>
      <td style="font-weight:700;color:var(--adm-text);font-size:.875rem">${escapeHTML(ad.price)}</td>
      <td>${country}</td>
      <td>${statusBadge(ad.status)}${ad.reports>0?` <span class="adm-badge adm-badge--rejected">${ad.reports} den.</span>`:''}</td>
      <td style="font-size:.8rem">${escapeHTML(ad.date)}</td>
      <td>
        <div class="adm-actions" style="justify-content:center">
          <button class="adm-btn-icon adm-btn-icon--green" onclick="approveAd(${ad.id})" title="Aprovar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--amber" onclick="featureAd(${ad.id})" title="Destacar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--blue" onclick="showToast('Edição em breve','info')" title="Editar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="adm-btn-icon adm-btn-icon--red" onclick="deleteAd(${ad.id})" title="Excluir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </td>
    </tr>
    `;
  }).join('');
}

function filterByStatus(val) {
  const rows = document.querySelectorAll('#ads-table tbody tr');
  rows.forEach(r => {
    if (!val) { r.style.display = ''; return; }
    r.style.display = r.textContent.toLowerCase().includes(val.toLowerCase()) ? '' : 'none';
  });
}
function filterByCategory(val) {
  const rows = document.querySelectorAll('#ads-table tbody tr');
  rows.forEach(r => {
    if (!val) { r.style.display = ''; return; }
    r.style.display = r.textContent.includes(val) ? '' : 'none';
  });
}
function filterByCountry(val) {
  const rows = document.querySelectorAll('#ads-table tbody tr');
  rows.forEach(r => {
    if (!val) { r.style.display = ''; return; }
    r.style.display = r.textContent.includes(val) ? '' : 'none';
  });
}
function toggleAll(cb) {
  document.querySelectorAll('#ads-table tbody input[type=checkbox]').forEach(c => c.checked = cb.checked);
}

function openNewAdModal() {
  document.getElementById('newAdModal').classList.add('open');
}

function saveNewAd(e) {
  e.preventDefault();
  const title = document.getElementById('newAdTitle').value;
  const seller = document.getElementById('newAdSeller').value;
  const plan = document.getElementById('newAdPlan').value;
  
  showToast(`Anúncio "${title}" criado com sucesso! Plano: ${plan.toUpperCase()}`, 'success');
  closeModal('newAdModal');
  document.getElementById('newAdForm').reset();
}
</script>
</body>
</html>
