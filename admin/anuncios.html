<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anúncios — Admin Tauze Class</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316A34A'/%3E%3Ctext y='24' x='6' font-size='20' font-weight='800' fill='white' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="adm-layout">
  <aside class="adm-sidebar" id="adm-sidebar"></aside>
  <div class="adm-main">

    <header class="adm-topbar">
      <div class="adm-breadcrumb">

    </header>

    <main class="adm-content">
      <div class="adm-page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h1 class="adm-page-title">Gerenciar Anúncios</h1>

        </div>
        <div style="display:flex;gap:8px">
          <button class="adm-btn adm-btn--outline" onclick="showToast('Exportação em andamento...','info')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar CSV

          <button class="adm-btn adm-btn--primary" onclick="openNewAdModal()">

            Novo Anúncio
          </button>
        </div>
      </div>

      <!-- Mini Stats -->
      <div class="adm-stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
        <div class="adm-stat-card">
          <div><div class="adm-stat-val" data-count="62847">0</div><div class="adm-stat-lbl">Total</div></div>
          <div class="adm-stat-icon adm-stat-icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
        </div>
        <div class="adm-stat-card">
          <div><div class="adm-stat-val" style="color:var(--adm-accent)" data-count="58230">0</div><div class="adm-stat-lbl">Ativos</div></div>
          <div class="adm-stat-icon adm-stat-icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>
        <div class="adm-stat-card">
          <div><div class="adm-stat-val" style="color:var(--adm-amber)" data-count="5">0</div><div class="adm-stat-lbl">Pendentes</div></div>
          <div class="adm-stat-icon adm-stat-icon--amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        </div>
        <div class="adm-stat-card">
          <div><div class="adm-stat-val" style="color:var(--adm-red)" data-count="3">0</div><div class="adm-stat-lbl">Rejeitados</div></div>
          <div class="adm-stat-icon adm-stat-icon--red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
        </div>
      </div>

      <!-- Table Card -->
      <div class="adm-card">
        <!-- Filters -->
        <div class="adm-filter-bar">
          <div class="adm-search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="ads-search" class="adm-search-input" placeholder="Buscar por título ou vendedor..."

<!-- ══════════════════════════════════════════════════════════
     MODAL: Novo Anúncio (Admin) — Formulário completo
     ══════════════════════════════════════════════════════════ -->
<div id="newAdModal" class="adm-overlay" onclick="if(event.target===this)closeModal('newAdModal')">
  <div class="adm-modal" style="max-width:680px;max-height:92vh;overflow-y:auto;padding:28px">

    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;border-bottom:1px solid var(--adm-border);padding-bottom:16px">
      <div>
        <h3 class="adm-modal-title" style="margin:0;font-size:1.15rem">📋 Novo Anúncio</h3>
        <p style="font-size:.78rem;color:var(--adm-text-muted);margin:4px 0 0">Preencha todos os campos obrigatórios *</p>
      </div>
      <button onclick="closeModal('newAdModal')" style="background:var(--adm-surface-2);border:none;color:var(--adm-text-muted);border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:background .2s" onmouseover="this.style.background='var(--adm-surface-3)'" onmouseout="this.style.background='var(--adm-surface-2)'">✕</button>
    </div>

    <form id="newAdForm" onsubmit="saveNewAd(event)">

      <!-- ── FOTOS ─────────────────────────────── -->
      <div style="margin-bottom:22px">
        <label class="adm-form-label" style="display:block;margin-bottom:8px">📷 Fotos <span style="color:var(--adm-text-muted);font-weight:400">(máx. 5 — a 1ª será a capa)</span></label>
        <div id="imgPreviewRow" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">
          <label for="imgUploadInput" id="imgAddBtn" style="width:90px;height:75px;border:2px dashed var(--adm-border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--adm-text-muted);font-size:.72rem;gap:4px;background:var(--adm-surface-2);transition:all .2s" onmouseover="this.style.borderColor='var(--adm-accent)'" onmouseout="this.style.borderColor='var(--adm-border)'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Adicionar
          </label>
        </div>
        <input type="file" id="imgUploadInput" accept="image/*" multiple style="display:none" onchange="handleImgUpload(this)">
      </div>

      <!-- ── TÍTULO ─────────────────────────────── -->
      <div style="margin-bottom:14px">
        <label class="adm-form-label" style="display:block;margin-bottom:6px">Título em Português *</label>
        <input type="text" id="newAdTitle" class="adm-input" placeholder="Ex: Fazenda 200ha — Soja/Milho, Mato Grosso" required style="height:42px">
      </div>
      <div style="margin-bottom:14px">
        <label class="adm-form-label" style="display:block;margin-bottom:6px">Título em Espanhol</label>
        <input type="text" id="newAdTitleEs" class="adm-input" placeholder="Versão em espanhol (opcional)" style="height:42px">
      </div>

      <!-- ── DESCRIÇÃO ─────────────────────────── -->
      <div style="margin-bottom:14px">
        <label class="adm-form-label" style="display:block;margin-bottom:6px">Descrição *</label>
        <textarea id="newAdDesc" class="adm-input" placeholder="Descreva o produto, características e informações relevantes..." required style="height:100px;resize:vertical;padding:10px 12px;line-height:1.55"></textarea>
      </div>

      <!-- ── CATEGORIA / MOEDA ───────────────────── -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Categoria *</label>
          <select id="newAdCategory" class="adm-select" required style="height:42px">
            <option value="">Selecionar...</option>
            <option value="bovinos">🐄 Bovinos</option>
            <option value="equinos">🐎 Equinos</option>
            <option value="suinos">🐖 Suínos</option>
            <option value="ovinos">🐑 Ovinos / Caprinos</option>
            <option value="aves">🐔 Aves</option>
            <option value="insumos">🌿 Insumos Agrícolas</option>
            <option value="maquinas">🚜 Máquinas e Equipamentos</option>
            <option value="imoveis">🏡 Imóveis Rurais</option>
            <option value="genetica">🧬 Genética e Reprodução</option>
            <option value="aquicult">🐟 Aquicultura</option>
            <option value="servicos">🔧 Serviços Rurais</option>
            <option value="outros">📦 Outros</option>
          </select>
        </div>
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Moeda</label>
          <select id="newAdCurrency" class="adm-select" style="height:42px">
            <option value="BRL">🇧🇷 BRL — Real</option>
            <option value="USD">🇺🇸 USD — Dólar</option>
            <option value="ARS">🇦🇷 ARS — Peso Arg.</option>
            <option value="PYG">🇵🇾 PYG — Guarani</option>
            <option value="UYU">🇺🇾 UYU — Peso Uru.</option>
          </select>
        </div>
      </div>

      <!-- ── PREÇO / UNIDADE ───────────────────────── -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Preço *</label>
          <input type="number" id="newAdPrice" class="adm-input" placeholder="0.00" min="0" step="0.01" required style="height:42px">
        </div>
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Unidade de Preço</label>
          <input type="text" id="newAdPriceUnit" class="adm-input" placeholder="por cabeça, por saca, por ha..." style="height:42px">
        </div>
      </div>
      <div style="margin-bottom:18px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.85rem;color:var(--adm-text)">
          <input type="checkbox" id="newAdNegotiable" style="accent-color:var(--adm-accent);width:16px;height:16px">
          Preço negociável
        </label>
      </div>

      <!-- ── LOCALIZAÇÃO ────────────────────────── -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px">
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">País *</label>
          <select id="newAdCountry" class="adm-select" required style="height:42px">
            <option value="">Selecionar...</option>
            <option value="Brasil">🇧🇷 Brasil</option>
            <option value="Argentina">🇦🇷 Argentina</option>
            <option value="Paraguai">🇵🇾 Paraguai</option>
            <option value="Uruguai">🇺🇾 Uruguai</option>
            <option value="Bolivia">🇧🇴 Bolívia</option>
            <option value="Chile">🇨🇱 Chile</option>
            <option value="Colombia">🇨🇴 Colômbia</option>
          </select>
        </div>
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Estado / Prov.</label>
          <input type="text" id="newAdState" class="adm-input" placeholder="Ex: MT, SP, GO" style="height:42px">
        </div>
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Cidade</label>
          <input type="text" id="newAdCity" class="adm-input" placeholder="Ex: Cuiabá" style="height:42px">
        </div>
      </div>

      <!-- ── VENDEDOR / STATUS ──────────── -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Vendedor (nome) *</label>
          <input type="text" id="newAdSeller" class="adm-input" placeholder="Nome do anunciante" required style="height:42px">
        </div>
        <div>
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Status</label>
          <select id="newAdStatus" class="adm-select" style="height:42px">
            <option value="active">✅ Ativo</option>
            <option value="pending">⏳ Pendente</option>
            <option value="paused">⏸️ Pausado</option>
            <option value="rejected">❌ Rejeitado</option>
          </select>
        </div>
      </div>

      <!-- ── PLANO / DESTAQUE ────────────────────── -->
      <div style="background:var(--adm-surface-2);border:1px solid var(--adm-border);border-radius:12px;padding:16px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap">
        <div style="flex:1;min-width:180px">
          <label class="adm-form-label" style="display:block;margin-bottom:6px">Plano</label>
          <select id="newAdPlan" class="adm-select" style="height:42px">
            <option value="normal">Normal (Gratuito)</option>
            <option value="premium">⭐ Premium — Destaque</option>
            <option value="top">🏆 Top — Topo absoluto</option>
          </select>
        </div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.85rem;color:var(--adm-text);white-space:nowrap;padding-top:20px">
          <input type="checkbox" id="newAdFeatured" style="accent-color:#F59E0B;width:16px;height:16px">
          ⭐ Marcar como Destaque
        </label>
      </div>

      <!-- ── BOTÕES ─────────────────────────────── -->
      <div style="display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--adm-border);padding-top:18px">
        <button type="button" class="adm-btn adm-btn--outline" onclick="closeModal('newAdModal')">Cancelar</button>
        <button type="submit" class="adm-btn adm-btn--primary" id="btnCriarAnuncio">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Publicar Anúncio
        </button>
      </div>

    </form>
  </div>
</div>

<script src="/admin/js/admin.js"></script>
<script>
const SB_URL = 'https://rfzuzuobwuanmbrcthqe.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmenV6dW9id3Vhbm1icmN0aHFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNzg1OTMsImV4cCI6MjA5ODY1NDU5M30.m-Mop7RgpVo730lwjcra1egF8p9APv6AGnW1YnFvOgY';

document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  renderSidebar('anuncios.html');
  const catSel = document.getElementById('cat-filter');
  ADMIN_CATS.forEach(c => { const o = document.createElement('option'); o.value = c.name; o.textContent = c.name; catSel.appendChild(o); });
  fetchAndRenderAds();
});

async function fetchAndRenderAds() {
  const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };
  try {
    const res = await fetch(`${SB_URL}/rest/v1/ads?select=id,title_pt,category_id,price,currency,status,featured,created_at,country,images,profiles(name)&order=created_at.desc&limit=50`, { headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('no data');
    const mapped = data.map(ad => ({
      id: ad.id, title: ad.title_pt || '(sem título)', category: ad.category_id || '',
      seller: ad.profiles?.name || '(desconhecido)',
      price: (ad.currency || '') + ' ' + (ad.price != null ? Number(ad.price).toLocaleString('pt-BR') : '—'),
      status: ad.status || 'active', featured: !!ad.featured, country: ad.country || '',
      image: Array.isArray(ad.images) && ad.images.length ? ad.images[0] : '',
      date: ad.created_at ? new Date(ad.created_at).toLocaleDateString('pt-BR') : '—', reports: 0,
    }));
    renderAdsTable(mapped);
    showToast(`${mapped.length} anúncios carregados`, 'success');
  } catch (err) {
    console.warn('[anuncios] Supabase fetch failed, using mock data:', err);
    renderAdsTable(ADMIN_ADS);
  }
}

function renderAdsTable(ads) {
  document.getElementById('ads-tbody').innerHTML = ads.map(ad => {
    const title = escapeHTML(ad.title), category = escapeHTML(ad.category);
    const seller = escapeHTML(ad.seller), country = escapeHTML(ad.country);
    return `<tr id="row-ad-${ad.id}">
      <td><input type="checkbox" style="accent-color:var(--adm-accent)"></td>
      <td><div style="display:flex;align-items:center;gap:10px">
        <img src="${escapeHTML(ad.image)}" alt="" style="width:44px;height:36px;border-radius:6px;object-fit:cover;background:var(--adm-surface-2)" onerror="this.style.background='var(--adm-surface-3)'">
        <div><div style="font-weight:600;color:var(--adm-text);font-size:.85rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ad.featured?'<span style="color:var(--adm-amber);margin-right:4px">★</span>':''}${title}</div>
        <div style="font-size:.72rem;color:var(--adm-text-light);margin-top:2px">${category}</div></div></div></td>
      <td>${seller}</td>
      <td style="font-weight:700;color:var(--adm-text);font-size:.875rem">${escapeHTML(ad.price)}</td>
      <td>${country}</td>
      <td>${statusBadge(ad.status)}${ad.reports>0?` <span class="adm-badge adm-badge--rejected">${ad.reports} den.</span>`:''}</td>
      <td style="font-size:.8rem">${escapeHTML(ad.date)}</td>
      <td><div class="adm-actions" style="justify-content:center">
        <button class="adm-btn-icon adm-btn-icon--green" onclick="approveAd(${ad.id})" title="Aprovar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
        <button class="adm-btn-icon adm-btn-icon--amber" onclick="featureAd(${ad.id})" title="Destacar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
        <button class="adm-btn-icon adm-btn-icon--blue" onclick="showToast('Edição em breve','info')" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="adm-btn-icon adm-btn-icon--red" onclick="deleteAd(${ad.id})" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div></td></tr>`;
  }).join('');
}

function filterByStatus(val) { document.querySelectorAll('#ads-table tbody tr').forEach(r => { r.style.display = !val || r.textContent.toLowerCase().includes(val.toLowerCase()) ? '' : 'none'; }); }
function filterByCategory(val) { document.querySelectorAll('#ads-table tbody tr').forEach(r => { r.style.display = !val || r.textContent.includes(val) ? '' : 'none'; }); }
function filterByCountry(val) { document.querySelectorAll('#ads-table tbody tr').forEach(r => { r.style.display = !val || r.textContent.includes(val) ? '' : 'none'; }); }
function toggleAll(cb) { document.querySelectorAll('#ads-table tbody input[type=checkbox]').forEach(c => c.checked = cb.checked); }

function openNewAdModal() {
  document.getElementById('newAdModal').classList.add('open');
  document.getElementById('newAdForm').reset();
  document.getElementById('imgPreviewRow').innerHTML = `<label for="imgUploadInput" id="imgAddBtn" style="width:90px;height:75px;border:2px dashed var(--adm-border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--adm-text-muted);font-size:.72rem;gap:4px;background:var(--adm-surface-2)" onmouseover="this.style.borderColor='var(--adm-accent)'" onmouseout="this.style.borderColor='var(--adm-border)'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Adicionar</label>`;
}

function handleImgUpload(input) {
  const files = Array.from(input.files).slice(0, 5);
  const row = document.getElementById('imgPreviewRow');
  row.querySelectorAll('.img-prev').forEach(el => el.remove());
  files.forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = e => {
      const div = document.createElement('div');
      div.className = 'img-prev';
      div.style.cssText = 'position:relative;width:90px;height:75px';
      div.innerHTML = `<img src="${e.target.result}" style="width:90px;height:75px;object-fit:cover;border-radius:10px;border:1px solid var(--adm-border)">${i===0?'<span style="position:absolute;bottom:4px;left:4px;background:rgba(22,163,74,.85);color:#fff;font-size:.6rem;padding:2px 5px;border-radius:4px;font-weight:600">CAPA</span>':''}<button type="button" onclick="this.parentElement.remove()" style="position:absolute;top:-6px;right:-6px;background:#ef4444;border:none;color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center">✕</button>`;
      row.insertBefore(div, document.getElementById('imgAddBtn'));
    };
    reader.readAsDataURL(file);
  });
}

async function saveNewAd(e) {
  e.preventDefault();
  const btn = document.getElementById('btnCriarAnuncio');
  btn.disabled = true; btn.textContent = '⏳ Publicando...';
  const session = JSON.parse(sessionStorage.getItem('tc_admin_session') || '{}');
  const payload = {
    title_pt: document.getElementById('newAdTitle').value.trim(),
    title_es: document.getElementById('newAdTitleEs').value.trim() || null,
    description: document.getElementById('newAdDesc').value.trim(),
    category_id: document.getElementById('newAdCategory').value,
    price: parseFloat(document.getElementById('newAdPrice').value) || 0,
    currency: document.getElementById('newAdCurrency').value,
    price_unit_pt: document.getElementById('newAdPriceUnit').value.trim() || null,
    negotiable: document.getElementById('newAdNegotiable').checked,
    country: document.getElementById('newAdCountry').value,
    state: document.getElementById('newAdState').value.trim() || null,
    city: document.getElementById('newAdCity').value.trim() || null,
    status: document.getElementById('newAdStatus').value,
    featured: document.getElementById('newAdFeatured').checked,
    images: [],
  };
  try {
    const res = await fetch(`${SB_URL}/rest/v1/ads`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${session.token || SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      showToast(`✅ Anúncio "${escapeHTML(payload.title_pt)}" publicado!`, 'success');
      closeModal('newAdModal');
      setTimeout(() => fetchAndRenderAds(), 800);
    } else {
      const err = await res.json();
      showToast(`Erro: ${err.message || res.status}`, 'error');
    }
  } catch(err) {
    showToast('Erro de conexão.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Publicar Anúncio';
  }
}
</script>
