version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tauze_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: tauze_meilisearch
    environment:
      - MEILI_MASTER_KEY=TauzeClassMeiliMasterKey2026
      - MEILI_NO_ANALYTICS=true
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    restart: always

volumes:
  redis_data:
  meili_data:
