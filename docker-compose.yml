version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tauze_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"  # bind apenas localhost
    volumes:
      - redis_data:/data
    restart: always

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: tauze_meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
      - MEILI_ENV=${MEILI_ENV:-development}
    ports:
      - "127.0.0.1:7700:7700"  # bind apenas localhost
    volumes:
      - meili_data:/meili_data
    restart: always

volumes:
  redis_data:
  meili_data:
