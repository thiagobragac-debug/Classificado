<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <!-- Security headers (defence-in-depth, complements server-side headers) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Aprovado — Tauze Class</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/style.css?v=1784160758676">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316A34A'/%3E%3Ctext y='24' x='6' font-size='20' font-weight='800' fill='white' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#16A34A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tauze Class">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Error Monitor (deve ser o primeiro script carregado) -->
  <script src="/js/error-monitor.js"></script>
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(r => console.log('[SW] Registrado:', r.scope))
          .catch(e => console.warn('[SW] Falha ao registrar:', e));
      });
    }
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:#0A0F0D;
      display:flex;align-items:center;justify-content:center;
      font-family:'Inter',system-ui,sans-serif;
      padding:2rem;
      position:relative;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(22,163,74,.15) 0%,transparent 70%);
      pointer-events:none;
    }
    .card{
      max-width:520px;width:100%;
      background:rgba(15,23,18,.9);
      backdrop-filter:blur(24px);
      border:1px solid rgba(22,163,74,.2);
      border-radius:24px;
      padding:3rem 2.5rem;
      text-align:center;
      box-shadow:0 40px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(22,163,74,.1);
      position:relative;z-index:1;
    }
    /* Animated checkmark */
    .check-wrap{
      width:90px;height:90px;
      border-radius:50%;
      background:linear-gradient(135deg,#16A34A,#15803D);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 2rem;
      box-shadow:0 0 0 16px rgba(22,163,74,.08), 0 0 0 32px rgba(22,163,74,.04);
      animation:popIn .5s cubic-bezier(.34,1.56,.64,1) .1s both;
    }
    @keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
    .check-wrap svg{width:44px;height:44px;stroke:#fff;stroke-width:2.5;fill:none;
      stroke-dasharray:60;stroke-dashoffset:60;
      animation:draw .5s ease .4s forwards;}
    @keyframes draw{to{stroke-dashoffset:0}}

    h1{font-size:2rem;font-weight:900;color:#fff;margin-bottom:.75rem;
       animation:fadeUp .4s ease .3s both;}
    .subtitle{color:rgba(255,255,255,.5);font-size:1rem;line-height:1.6;margin-bottom:2rem;
              animation:fadeUp .4s ease .4s both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    .plan-badge{
      display:inline-flex;align-items:center;gap:.5rem;
      background:rgba(22,163,74,.15);border:1px solid rgba(22,163,74,.3);
      color:#4ADE80;padding:.5rem 1.25rem;border-radius:2rem;
      font-weight:700;font-size:.95rem;margin-bottom:2rem;
      animation:fadeUp .4s ease .5s both;
    }
    .actions{display:flex;flex-direction:column;gap:.75rem;animation:fadeUp .4s ease .6s both;}
    .btn-primary{
      padding:.85rem 1.5rem;
      background:linear-gradient(135deg,#16A34A,#15803D);
      border:none;border-radius:12px;color:#fff;
      font-size:1rem;font-weight:700;cursor:pointer;
      text-decoration:none;display:block;
      transition:all .2s;
      box-shadow:0 4px 20px rgba(22,163,74,.3);
    }
    .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .btn-secondary{
      padding:.8rem 1.5rem;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:12px;color:rgba(255,255,255,.6);
      font-size:.9rem;font-weight:600;cursor:pointer;
      text-decoration:none;display:block;transition:all .2s;
    }
    .btn-secondary:hover{background:rgba(255,255,255,.08);color:#fff;}

    /* Confetti particles */
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
    .particle{
      position:absolute;top:-10px;
      width:8px;height:8px;border-radius:2px;
      animation:fall linear forwards;
    }
    @keyframes fall{
      to{transform:translateY(110vh) rotate(720deg);opacity:0}
    }
  </style>
  <script>
    let hasToken = false;
    for(let i=0; i<localStorage.length; i++){
      if(localStorage.key(i).includes('auth-token')){ hasToken=true; break; }
    }
    if (hasToken) {
      document.documentElement.classList.add('is-logged-in');
      let ini = localStorage.getItem('tc_user_initials');
      if (ini) document.documentElement.style.setProperty('--tc-user-ini', '"' + ini + '"');
    }
  </script>
</head>
<body>

  <!-- Lang Toggle -->
  <div class="lang-toggle" style="position:fixed;top:1.2rem;right:1.5rem;z-index:1000">
    <button data-lang="pt">PT</button>
    <button data-lang="es">ES</button>
  </div>

  <!-- Confetti -->
  <div class="confetti-wrap" id="confetti"></div>

  <div class="card">
    <div class="check-wrap">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1 data-i18n="sucesso_title">Pagamento Aprovado! 🎉</h1>
    <p class="subtitle" data-i18n="sucesso_sub">Seu plano foi ativado com sucesso. Agora você tem acesso a todos os recursos premium do Tauze Class.</p>

    <div class="plan-badge" id="plan-badge">
      ❖ Plano Ativo
    </div>

    <div class="actions">
      <a href="/anunciar.html" class="btn-primary" data-i18n="sucesso_btn_post">Publicar meu primeiro anúncio</a>
      <a href="/painel.html" class="btn-secondary" data-i18n="sucesso_btn_panel">Ir para o Meu Painel</a>
    </div>
  </div>

  <script src="/js/supabase.js?v=1784070010052"></script>
  <script src="/js/data.js?v=1783509347784"></script>
  <script src="/js/main.js?v=1784163733347"></script>
  <script>
    // Show plan name
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan') || 'pro';
    const planNames = { pro: 'Plano Pro ✦', premium: 'Plano Premium ★' };
    document.getElementById('plan-badge').textContent = planNames[plan] || 'Plano Ativo';

    // Generate confetti
    const colors = ['#16A34A','#4ADE80','#86EFAC','#FCD34D','#F59E0B','#60A5FA','#A78BFA'];
    const wrap = document.getElementById('confetti');
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.animationDuration = (2 + Math.random() * 3) + 's';
      el.style.animationDelay = (Math.random() * 1.5) + 's';
      el.style.opacity = (0.6 + Math.random() * 0.4).toString();
      wrap.appendChild(el);
    }

    // Auto-redirect to dashboard after 8s
    setTimeout(() => { window.location.href = '/painel.html'; }, 8000);
  </script>
</body>
</html>
